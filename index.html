<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>THE BOARD — Pack Opening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#03030f}
body{font-family:'Rajdhani',sans-serif;color:#fff;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
#bg-canvas,#particles-canvas{position:fixed;inset:0;pointer-events:none}
#bg-canvas{z-index:1}#particles-canvas{z-index:60}
#flash{position:fixed;inset:0;z-index:80;background:#fff;opacity:0;pointer-events:none;transition:opacity .08s}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(14px,2.8vh,30px);padding:16px;transition:opacity .4s ease}
.screen.hidden{opacity:0;pointer-events:none}
.main-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(50px,10.5vw,100px);letter-spacing:.06em;line-height:1;background:linear-gradient(135deg,#F5C518 0%,#FFE68F 38%,#F5C518 55%,#B8860B 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 24px rgba(245,197,24,.45))}
.sub-title{font-weight:500;font-size:clamp(12px,2.5vw,17px);letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.42);margin-top:4px}
.packs-row{display:flex;gap:clamp(8px,2vw,30px);align-items:flex-end;justify-content:center;perspective:900px}
.pack{width:clamp(112px,18vw,180px);height:clamp(176px,28vw,282px);border-radius:16px;position:relative;cursor:pointer;overflow:hidden;transform-style:preserve-3d;transition:transform .12s ease,box-shadow .3s ease;flex-shrink:0}
.pack.opened{opacity:.35;cursor:default;filter:grayscale(.6);pointer-events:none}
.pack-opened-check{display:none;position:absolute;inset:0;z-index:20;align-items:center;justify-content:center;background:rgba(0,0,0,.45);border-radius:inherit;font-size:clamp(26px,4.5vw,44px)}
.pack.opened .pack-opened-check{display:flex}
.pack-1{background:linear-gradient(158deg,#0B1E3A,#0D2B4A,#071520);border:2px solid #F5C518;box-shadow:0 0 0 1px rgba(245,197,24,.32),0 0 26px rgba(245,197,24,.1),0 16px 52px rgba(0,0,0,.65)}
.pack-1:not(.opened):hover{box-shadow:0 0 0 2px rgba(245,197,24,.72),0 0 42px rgba(245,197,24,.3),0 0 88px rgba(245,197,24,.1),0 26px 52px rgba(0,0,0,.7)}
.pack-2{width:clamp(122px,20vw,194px);height:clamp(196px,31vw,308px);background:linear-gradient(158deg,#2D0A20,#3D1030,#1A0812);border:2px solid #FF6B9D;box-shadow:0 0 0 1px rgba(255,107,157,.32),0 0 26px rgba(255,107,157,.1),0 16px 52px rgba(0,0,0,.65)}
.pack-2:not(.opened):hover{box-shadow:0 0 0 2px rgba(255,107,157,.72),0 0 42px rgba(255,107,157,.3),0 26px 52px rgba(0,0,0,.7)}
.pack-3{background:linear-gradient(158deg,#03102A,#051630,#020810);border:2px solid #0096FF;box-shadow:0 0 0 1px rgba(0,150,255,.32),0 0 26px rgba(0,150,255,.1),0 16px 52px rgba(0,0,0,.65)}
.pack-3:not(.opened):hover{box-shadow:0 0 0 2px rgba(0,150,255,.72),0 0 42px rgba(0,150,255,.3),0 26px 52px rgba(0,0,0,.7)}
.pack-shimmer{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden;border-radius:inherit}
.pack-shimmer::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.1) 50%,transparent 70%);animation:shimmerSlide 3.5s ease-in-out infinite}
@keyframes shimmerSlide{0%{left:-100%}65%,100%{left:200%}}
.pack-featured-badge{position:absolute;top:8px;right:-26px;z-index:15;background:linear-gradient(90deg,#FF6B9D,#FF8C42);color:#fff;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 28px;transform:rotate(35deg);white-space:nowrap}
.pack-corner{position:absolute;width:10px;height:10px;z-index:6;pointer-events:none}
.pack-corner.tl{top:6px;left:6px;border-top:1.5px solid;border-left:1.5px solid;border-radius:2px 0 0 0}
.pack-corner.tr{top:6px;right:6px;border-top:1.5px solid;border-right:1.5px solid;border-radius:0 2px 0 0}
.pack-corner.bl{bottom:6px;left:6px;border-bottom:1.5px solid;border-left:1.5px solid;border-radius:0 0 0 2px}
.pack-corner.br{bottom:6px;right:6px;border-bottom:1.5px solid;border-right:1.5px solid;border-radius:0 0 2px 0}
.pack-1 .pack-corner{border-color:rgba(245,197,24,.5)}.pack-2 .pack-corner{border-color:rgba(255,107,157,.5)}.pack-3 .pack-corner{border-color:rgba(0,150,255,.5)}
.pack-inner-glow{position:absolute;inset:0;z-index:1;pointer-events:none;border-radius:inherit}
.pack-1 .pack-inner-glow{background:radial-gradient(ellipse at 50% 50%,rgba(245,197,24,.07) 0%,transparent 70%)}
.pack-2 .pack-inner-glow{background:radial-gradient(ellipse at 50% 50%,rgba(255,107,157,.07) 0%,transparent 70%)}
.pack-3 .pack-inner-glow{background:radial-gradient(ellipse at 50% 50%,rgba(0,150,255,.07) 0%,transparent 70%)}
.pack-top-section{position:absolute;top:0;left:0;right:0;height:28%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 8px 5px;z-index:4}
.pack-brand{font-size:clamp(7px,1.3vw,11px);letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.pack-rarity{font-weight:700;font-size:clamp(10px,1.8vw,14px);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.pack-1 .pack-rarity{color:#F5C518}.pack-2 .pack-rarity{background:linear-gradient(90deg,#FF6B9D,#FF8C42);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.pack-3 .pack-rarity{color:#0096FF}
.pack-divider{width:55%;height:1px;margin-top:5px;opacity:.35;border-radius:1px}
.pack-1 .pack-divider{background:linear-gradient(90deg,transparent,#F5C518,transparent)}.pack-2 .pack-divider{background:linear-gradient(90deg,transparent,#FF6B9D,transparent)}.pack-3 .pack-divider{background:linear-gradient(90deg,transparent,#0096FF,transparent)}
.pack-center{position:absolute;top:28%;left:0;right:0;height:46%;display:flex;align-items:center;justify-content:center;z-index:4}
.pack-mystery{position:absolute;font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,78px);color:#fff;opacity:.07;z-index:2}
.pack-icon-svg{width:58%;height:58%;position:relative;z-index:3;filter:drop-shadow(0 0 6px currentColor)}
.pack-1 .pack-icon-svg{color:#F5C518}.pack-2 .pack-icon-svg{color:#FF6B9D}.pack-3 .pack-icon-svg{color:#0096FF}
.pack-bottom-section{position:absolute;bottom:0;left:0;right:0;height:26%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 8px 8px;z-index:4;gap:2px}
.pack-stars{font-size:clamp(9px,1.7vw,13px);letter-spacing:3px}
.pack-1 .pack-stars{color:#F5C518}.pack-2 .pack-stars{color:#FF6B9D}.pack-3 .pack-stars{color:#0096FF}
.pack-name-label{font-weight:600;font-size:clamp(8px,1.4vw,11px);letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.52)}
.pack-cta-label{font-weight:600;font-size:clamp(7px,1.2vw,10px);letter-spacing:.14em;text-transform:uppercase;padding:2px 10px;border-radius:100px;color:rgba(255,255,255,.32);border:1px solid rgba(255,255,255,.1)}
.progress-area{text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.progress-label{font-size:clamp(10px,1.9vw,14px);letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.progress-dots{display:flex;gap:14px}
.progress-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);background:transparent;transition:all .5s cubic-bezier(.34,1.56,.64,1)}
.progress-dot.lit{background:#F5C518;border-color:#F5C518;box-shadow:0 0 12px rgba(245,197,24,.7)}
#screen-opening{z-index:50}
@keyframes packShake{
  0%{transform:scale(1.38) rotate(0) translate(0,0)}8%{transform:scale(1.39) rotate(-2.5deg) translate(-6px,-2px)}
  17%{transform:scale(1.40) rotate(2.5deg) translate(6px,2px)}25%{transform:scale(1.39) rotate(-2deg) translate(-5px,-1px)}
  33%{transform:scale(1.40) rotate(2deg) translate(5px,1px)}50%{transform:scale(1.40) rotate(1.5deg) translate(3px,0)}
  67%{transform:scale(1.41) rotate(1deg) translate(2px,-1px)}83%{transform:scale(1.42) rotate(.4deg) translate(1px,0)}
  100%{transform:scale(1.42) rotate(0) translate(0,0)}
}
#screen-reveal{z-index:70;gap:clamp(12px,2.4vh,24px)}
.logo-wrapper{position:relative;display:flex;align-items:center;justify-content:center}
#logo-halo{position:absolute;width:clamp(250px,72vw,420px);height:clamp(250px,72vw,420px);border-radius:50%;opacity:0;pointer-events:none;transition:opacity .9s ease .1s;animation:haloPulse 3s ease-in-out infinite}
@keyframes haloPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
#reveal-img{width:clamp(200px,62vw,360px);height:clamp(200px,62vw,360px);object-fit:contain;border-radius:50%;position:relative;z-index:2;opacity:0;transform:scale(.38) rotate(-8deg);transition:opacity .7s cubic-bezier(.34,1.56,.64,1) .08s,transform .7s cubic-bezier(.34,1.56,.64,1) .08s;filter:drop-shadow(0 0 28px rgba(255,255,255,.14))}
#reveal-img.show{opacity:1;transform:scale(1) rotate(0);animation:imgFloat 4s ease-in-out infinite 1.2s}
@keyframes imgFloat{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1) translateY(-9px)}}
.reveal-name-area{text-align:center;opacity:0;transform:translateY(18px);transition:all .55s ease .52s}
.reveal-name-area.show{opacity:1;transform:translateY(0)}
.reveal-decoration{font-size:clamp(9px,2vw,12px);letter-spacing:.35em;color:rgba(255,255,255,.28);margin-bottom:5px}
#reveal-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,5.5vw,42px);letter-spacing:.08em;line-height:1}
.reveal-sub{font-weight:500;font-size:clamp(9px,1.8vw,12px);letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.32);margin-top:4px}
#back-btn{font-weight:600;font-size:clamp(11px,2.4vw,14px);letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.52);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.13);padding:10px 26px;border-radius:100px;cursor:pointer;opacity:0;transform:translateY(18px);transition:opacity .4s ease .92s,transform .4s ease .92s,color .2s,background .2s,border-color .2s}
#back-btn.show{opacity:1;transform:translateY(0)}
#back-btn:hover{color:#fff;border-color:rgba(255,255,255,.36);background:rgba(255,255,255,.09)}
#celebration{font-size:clamp(9px,1.9vw,13px);letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);opacity:0;transition:opacity .4s ease 1.3s;text-align:center}
#celebration.show{opacity:1}
#music-btn{position:fixed;top:16px;right:16px;z-index:200;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .25s,border-color .25s,transform .2s}
#music-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);transform:scale(1.08)}
#music-btn.muted{opacity:.4}
#music-btn .bar{display:flex;gap:2.5px;align-items:flex-end;height:16px}
#music-btn .bar span{width:3px;background:#F5C518;border-radius:2px;animation:barDance var(--d) ease-in-out infinite alternate}
@keyframes barDance{0%{transform:scaleY(.3)}100%{transform:scaleY(1)}}
#music-btn.muted .bar span{animation:none;transform:scaleY(.3);opacity:.4}
@media(max-width:400px){.packs-row{gap:6px}.pack{border-radius:12px}}
@media(max-height:620px){.screen{gap:8px}.main-title{font-size:clamp(36px,8.5vw,58px)}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="particles-canvas"></canvas>
<div id="flash"></div>

<button id="music-btn" onclick="toggleMusic()" title="Musique on/off">
  <div class="bar">
    <span style="height:55%;--d:0.5s"></span>
    <span style="height:100%;--d:0.7s"></span>
    <span style="height:70%;--d:0.6s"></span>
    <span style="height:90%;--d:0.8s"></span>
  </div>
</button>

<div id="screen-select" class="screen">
  <div style="text-align:center">
    <h1 class="main-title">THE BOARD</h1>
    <p class="sub-title">Choisis un pack pour révéler un logo</p>
  </div>
  <div class="packs-row">

    <div class="pack pack-1" id="pack-0" onclick="selectPack(0)">
      <div class="pack-inner-glow"></div><div class="pack-shimmer"></div>
      <div class="pack-corner tl"></div><div class="pack-corner tr"></div>
      <div class="pack-corner bl"></div><div class="pack-corner br"></div>
      <div class="pack-top-section"><span class="pack-brand">THE BOARD</span><span class="pack-rarity">ICON PACK</span><div class="pack-divider"></div></div>
      <div class="pack-center">
        <div class="pack-mystery">?</div>
        <svg class="pack-icon-svg" viewBox="0 0 80 80" fill="none">
          <circle cx="40" cy="40" r="33" stroke="#F5C518" stroke-width="1.2" stroke-dasharray="5 3" opacity=".35"/>
          <circle cx="40" cy="40" r="19" stroke="#F5C518" stroke-width=".8" opacity=".22"/>
          <line x1="40" y1="7" x2="40" y2="73" stroke="#F5C518" stroke-width=".7" opacity=".2"/>
          <line x1="7" y1="40" x2="73" y2="40" stroke="#F5C518" stroke-width=".7" opacity=".2"/>
          <path d="M40 8 L44.5 35 L40 30 L35.5 35 Z" fill="#F5C518" opacity=".92"/>
          <path d="M40 72 L44.5 45 L40 50 L35.5 45 Z" fill="#4ECDC4" opacity=".5"/>
          <circle cx="40" cy="40" r="4.5" fill="#F5C518" opacity=".85"/><circle cx="40" cy="40" r="2" fill="#fff" opacity=".8"/>
        </svg>
      </div>
      <div class="pack-bottom-section"><span class="pack-stars">★ ★ ★</span><span class="pack-name-label">Travel Icon</span><span class="pack-cta-label">Ouvrir</span></div>
      <div class="pack-opened-check">✓</div>
    </div>

    <div class="pack pack-2" id="pack-1" onclick="selectPack(1)" style="overflow:visible">
      <div style="overflow:hidden;border-radius:inherit;position:absolute;inset:0">
        <div class="pack-inner-glow"></div><div class="pack-shimmer"></div>
        <div class="pack-featured-badge">⭐ FEATURED</div>
        <div class="pack-corner tl"></div><div class="pack-corner tr"></div>
        <div class="pack-corner bl"></div><div class="pack-corner br"></div>
        <div class="pack-top-section"><span class="pack-brand">THE BOARD</span><span class="pack-rarity">LEGEND PACK</span><div class="pack-divider"></div></div>
        <div class="pack-center">
          <div class="pack-mystery">?</div>
          <svg class="pack-icon-svg" viewBox="0 0 80 80" fill="none">
            <path d="M39 76 Q41 56 44 40" stroke="#FF8C42" stroke-width="3.5" stroke-linecap="round" opacity=".75"/>
            <path d="M44 40 Q22 30 12 18" stroke="#FF6B9D" stroke-width="2.2" stroke-linecap="round" opacity=".7"/>
            <path d="M44 40 Q36 20 31 6" stroke="#FF6B9D" stroke-width="2.2" stroke-linecap="round" opacity=".65"/>
            <path d="M44 40 Q52 18 58 6" stroke="#FF6B9D" stroke-width="2.2" stroke-linecap="round" opacity=".65"/>
            <path d="M44 40 Q62 28 72 20" stroke="#FF6B9D" stroke-width="2.2" stroke-linecap="round" opacity=".65"/>
            <circle cx="21" cy="17" r="8" fill="#FFD93D" opacity=".55"/><circle cx="21" cy="17" r="5" fill="#FFD93D" opacity=".8"/>
          </svg>
        </div>
        <div class="pack-bottom-section"><span class="pack-stars">★ ★ ★</span><span class="pack-name-label">Summer Legend</span><span class="pack-cta-label">Ouvrir</span></div>
        <div class="pack-opened-check">✓</div>
      </div>
    </div>

    <div class="pack pack-3" id="pack-2" onclick="selectPack(2)">
      <div class="pack-inner-glow"></div><div class="pack-shimmer"></div>
      <div class="pack-corner tl"></div><div class="pack-corner tr"></div>
      <div class="pack-corner bl"></div><div class="pack-corner br"></div>
      <div class="pack-top-section"><span class="pack-brand">THE BOARD</span><span class="pack-rarity">ELITE PACK</span><div class="pack-divider"></div></div>
      <div class="pack-center">
        <div class="pack-mystery">?</div>
        <svg class="pack-icon-svg" viewBox="0 0 80 80" fill="none">
          <path d="M12 43 L54 30 L70 43 L54 56 Z" fill="#0096FF" opacity=".75"/>
          <path d="M33 36 L62 26 L68 38" fill="#00D4FF" opacity=".5"/>
          <line x1="3" y1="45" x2="38" y2="40" stroke="#0096FF" stroke-width="1.8" stroke-dasharray="6 3" opacity=".48"/>
          <circle cx="62" cy="13" r="2.2" fill="#C0F0FF" opacity=".7"/>
          <circle cx="72" cy="24" r="1.6" fill="#C0F0FF" opacity=".5"/>
        </svg>
      </div>
      <div class="pack-bottom-section"><span class="pack-stars">★ ★ ★</span><span class="pack-name-label">Night Elite</span><span class="pack-cta-label">Ouvrir</span></div>
      <div class="pack-opened-check">✓</div>
    </div>

  </div>
  <div class="progress-area">
    <p class="progress-label" id="prog-label">0 / 3 packs ouverts</p>
    <div class="progress-dots"><div class="progress-dot" id="dot-0"></div><div class="progress-dot" id="dot-1"></div><div class="progress-dot" id="dot-2"></div></div>
  </div>
</div>

<div id="screen-opening" class="screen hidden" style="transition:background .3s ease"></div>

<div id="screen-reveal" class="screen hidden">
  <div class="logo-wrapper">
    <div id="logo-halo"></div>
    <img id="reveal-img" src="" alt="Logo THE BOARD">
  </div>
  <div class="reveal-name-area" id="reveal-name-area">
    <div class="reveal-decoration">✦ ✦ ✦</div>
    <div id="reveal-name"></div>
    <div class="reveal-sub">Logo THE BOARD dévoilé</div>
  </div>
  <button id="back-btn" onclick="backToSelection()">← Ouvrir un autre pack</button>
  <div id="celebration"></div>
</div>

<script>
const LOGOS=[
  {src:'logo1.png',name:'TRAVEL ICON',  glow:'245,197,24',  haloA:'rgba(245,197,24,.55)', haloB:'rgba(78,205,196,.22)',  nameColor:'#F5C518'},
  {src:'logo2.png',name:'SUMMER LEGEND',glow:'255,107,157', haloA:'rgba(255,107,157,.55)',haloB:'rgba(255,215,61,.22)',   nameGrad:'linear-gradient(90deg,#FF6B9D,#FF8C42)'},
  {src:'logo3.png',name:'NIGHT ELITE',  glow:'0,150,255',   haloA:'rgba(0,150,255,.55)', haloB:'rgba(0,212,255,.22)',    nameColor:'#0096FF'}
];
const PACK_CFG=[
  {colors:['#F5C518','#FFE68F','#4ECDC4','#FFA500','#fff'],bg:'linear-gradient(158deg,#0B1E3A,#0D2B4A,#071520)',border:'#F5C518'},
  {colors:['#FF6B9D','#FF8C42','#FFD93D','#FF4757','#fff'],bg:'linear-gradient(158deg,#2D0A20,#3D1030,#1A0812)',border:'#FF6B9D'},
  {colors:['#0096FF','#00D4FF','#7B2FBE','#C0F0FF','#fff'],bg:'linear-gradient(158deg,#03102A,#051630,#020810)',border:'#0096FF'}
];
const opened=[false,false,false];
let busy=false;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const raf=()=>new Promise(r=>requestAnimationFrame(r));
const $=id=>document.getElementById(id);

// STARS
const bgC=$('bg-canvas'),bgX=bgC.getContext('2d');
function resizeBg(){bgC.width=innerWidth;bgC.height=innerHeight}resizeBg();
const STARS=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:.4+Math.random()*1.6,a:.15+Math.random()*.65,ph:Math.random()*Math.PI*2}));
(function drawBg(t){bgX.clearRect(0,0,bgC.width,bgC.height);STARS.forEach(s=>{const tw=.5+.5*Math.sin(t*.0014+s.ph);bgX.globalAlpha=s.a*tw;bgX.fillStyle='#fff';bgX.beginPath();bgX.arc(s.x*bgC.width,s.y*bgC.height,s.r,0,Math.PI*2);bgX.fill()});bgX.globalAlpha=1;requestAnimationFrame(drawBg)})(0);

// PARTICLES
const pC=$('particles-canvas'),pX=pC.getContext('2d');
let pts=[],ptRunning=false;
function resizePc(){pC.width=innerWidth;pC.height=innerHeight}resizePc();
class Pt{
  constructor(x,y,colors,burst){
    this.x=x;this.y=y;const a=Math.random()*Math.PI*2,s=burst?(3+Math.random()*13):(1+Math.random()*3.5);
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-(burst?.5:0);
    this.sz=1.5+Math.random()*(burst?7:4);this.col=colors[Math.floor(Math.random()*colors.length)];
    this.life=1;this.decay=burst?(.012+Math.random()*.018):(.006+Math.random()*.012);
    this.g=burst?.09:.04;this.type=Math.floor(Math.random()*3);
    this.rot=Math.random()*Math.PI*2;this.rv=(Math.random()-.5)*.12;
  }
  step(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.g;this.vx*=.985;this.life-=this.decay;this.rot+=this.rv}
  draw(ctx){
    if(this.life<=0)return;ctx.save();ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.col;
    ctx.translate(this.x,this.y);ctx.rotate(this.rot);const s=this.sz;
    if(this.type===2){ctx.beginPath();for(let i=0;i<8;i++){const a=i*Math.PI/4,r=i%2?s*.38:s;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill()}
    else if(this.type===1)ctx.fillRect(-s/2,-s/2,s,s);
    else{ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill()}
    ctx.restore();
  }
}
function spawnPts(x,y,cols,n,burst=false){for(let i=0;i<n;i++)pts.push(new Pt(x,y,cols,burst))}
function runPts(){
  if(ptRunning)return;ptRunning=true;
  (function loop(){resizePc();pX.clearRect(0,0,pC.width,pC.height);pts=pts.filter(p=>p.life>0);pts.forEach(p=>{p.step();p.draw(pX)});if(pts.length>0)requestAnimationFrame(loop);else ptRunning=false})();
}

// EPIC MUSIC
class EpicBeat{
  constructor(){this.ac=null;this.master=null;this.reverb=null;this.beat=0;this.nextTime=0;this.timer=null;this.AHEAD=0.12;this.BPM=116;this.playing=false;this.noiseL=null;this.noiseS=null}
  get bl(){return 60/this.BPM}
  _init(){
    if(this.ac)return;
    this.ac=new(window.AudioContext||window.webkitAudioContext)();
    this.master=this.ac.createGain();this.master.gain.value=0;this.master.connect(this.ac.destination);
    const rl=this.ac.sampleRate*2.2,rb=this.ac.createBuffer(2,rl,this.ac.sampleRate);
    for(let c=0;c<2;c++){const d=rb.getChannelData(c);for(let i=0;i<rl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rl,2.2)}
    this.reverb=this.ac.createConvolver();this.reverb.buffer=rb;
    const rv=this.ac.createGain();rv.gain.value=.2;this.reverb.connect(rv);rv.connect(this.master);
    const n1=this.ac.createBuffer(1,this.ac.sampleRate*.18,this.ac.sampleRate);
    {const d=n1.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1}this.noiseL=n1;
    const n2=this.ac.createBuffer(1,this.ac.sampleRate*.055,this.ac.sampleRate);
    {const d=n2.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1}this.noiseS=n2;
  }
  _noise(buf,gain,ftype,ffreq,t){
    const ac=this.ac,s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();
    s.buffer=buf;g.gain.value=gain;f.type=ftype;f.frequency.value=ffreq;
    s.connect(f);f.connect(g);g.connect(this.master);s.start(t);
  }
  _osc(type,freq,vol,t,dur,rev=false,det=0){
    const ac=this.ac,oscs=det?[-det,0,det]:[0];
    oscs.forEach(d=>{
      const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
      o.type=type;o.frequency.value=freq;if(d)o.detune.value=d;
      f.type='lowpass';f.frequency.value=type==='sawtooth'?900:4000;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol/oscs.length,t+.03);
      g.gain.setValueAtTime(vol/oscs.length,t+dur-.06);g.gain.linearRampToValueAtTime(0,t+dur);
      o.connect(f);f.connect(g);g.connect(this.master);
      if(rev){const gr=ac.createGain();gr.gain.value=.3;f.connect(gr);gr.connect(this.reverb)}
      o.start(t);o.stop(t+dur+.01);
    });
  }
  _kick(t){
    const ac=this.ac,o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(38,t+.18);
    g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+.32);
    const o2=ac.createOscillator(),g2=ac.createGain();
    o2.type='sine';o2.frequency.value=55;g2.gain.setValueAtTime(.28,t);g2.gain.exponentialRampToValueAtTime(.001,t+.22);
    o2.connect(g2);g2.connect(this.master);o2.start(t);o2.stop(t+.25);
  }
  sched(b,t){
    const bl=this.bl;
    if(b%4===0)this._kick(t);
    if(b===4||b===12)this._noise(this.noiseL,.25,'bandpass',3200,t);
    if(b%4===2)this._noise(this.noiseS,.08,'highpass',11000,t);
    if(b%2===1)this._noise(this.noiseS,.04,'highpass',11000,t);
    const bm={0:55,4:43.65,8:65.41,12:49};if(b in bm)this._osc('sawtooth',bm[b],.22,t,bl*3.6);
    const ch={0:[220,261.63,329.63],4:[174.61,220,261.63],8:[130.81,164.81,196],12:[196,246.94,329.63]};
    if(b in ch)ch[b].forEach(f=>this._osc('sawtooth',f,.03,t,bl*4.2,true,10));
    const hp={0:[440,523.25,659.25],4:[349.23,440,523.25],8:[261.63,329.63,392],12:[392,493.88,659.25]};
    if(b in hp)hp[b].forEach(f=>this._osc('sine',f,.014,t,bl*4.2,true));
    const mel=[659.25,-1,587.33,-1,523.25,659.25,440,-1,392,-1,440,-1,523.25,659.25,587.33,-1];
    if(mel[b]>0)this._osc('triangle',mel[b],.062,t,bl*.75,true);
    const cm={2:523.25,6:587.33,10:523.25,14:440};if(b in cm)this._osc('triangle',cm[b],.035,t,bl*.5,true);
  }
  _run(){
    while(this.nextTime<this.ac.currentTime+this.AHEAD){this.sched(this.beat,this.nextTime);this.nextTime+=this.bl;this.beat=(this.beat+1)%16}
    this.timer=setTimeout(()=>this._run(),25);
  }
  start(){if(this.playing)return;this._init();this.playing=true;this.beat=0;this.nextTime=this.ac.currentTime+.15;this.master.gain.setValueAtTime(0,this.ac.currentTime);this.master.gain.linearRampToValueAtTime(.38,this.ac.currentTime+2.5);this._run()}
  stop(){clearTimeout(this.timer);this.timer=null;this.playing=false;if(this.master&&this.ac)this.master.gain.linearRampToValueAtTime(0,this.ac.currentTime+1.2)}
  duck(){if(this.master&&this.ac)this.master.gain.linearRampToValueAtTime(.1,this.ac.currentTime+.4)}
  unduck(){if(this.master&&this.ac)this.master.gain.linearRampToValueAtTime(.38,this.ac.currentTime+1.2)}
  toggle(){if(this.playing)this.stop();else this.start();return this.playing}
}
const music=new EpicBeat();
let musicStarted=false;
function ensureMusic(){if(!musicStarted){musicStarted=true;music.start()}}
function toggleMusic(){ensureMusic();const p=music.toggle();$('music-btn').classList.toggle('muted',!p)}

// SFX
function sfxAC(){if(!music.ac)music._init();return music.ac}
function playWhoosh(){try{const ac=sfxAC(),d=.32,buf=ac.createBuffer(1,ac.sampleRate*d,ac.sampleRate),dt=buf.getChannelData(0);for(let i=0;i<dt.length;i++){const t=i/ac.sampleRate;dt[i]=(Math.random()*2-1)*Math.exp(-t*9)*(1-Math.exp(-t*25))}const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=900;f.frequency.exponentialRampToValueAtTime(180,ac.currentTime+d);g.gain.value=.18;s.buffer=buf;s.connect(f);f.connect(g);g.connect(ac.destination);s.start()}catch(e){}}
function playRumble(){try{const ac=sfxAC();for(let k=0;k<3;k++){const buf=ac.createBuffer(1,ac.sampleRate*.5,ac.sampleRate),dt=buf.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*.18));const s=ac.createBufferSource(),g=ac.createGain();g.gain.value=.07;s.buffer=buf;s.connect(g);g.connect(ac.destination);s.start(ac.currentTime+k*.08)}}catch(e){}}
function playReveal(){try{const ac=sfxAC();[261.6,329.6,392,523.3,659.3,784,1046.5].forEach((fr,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=fr;const tt=ac.currentTime+i*.07;g.gain.setValueAtTime(0,tt);g.gain.linearRampToValueAtTime(.1,tt+.02);g.gain.exponentialRampToValueAtTime(.001,tt+.48);o.connect(g);g.connect(ac.destination);o.start(tt);o.stop(tt+.5)})}catch(e){}}

document.querySelectorAll('.pack').forEach((pk,i)=>{

});
